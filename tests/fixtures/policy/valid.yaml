# Valid AgToosa governance policy fixture (DEV-059). Secret-free.
version: 1

paths:
  - id: PATH-001
    description: Restrict agent edits to Docs, lib, template, and tests
    enforcement_class: agent-instructed
    on_violation: instruct_stop

tools:
  - id: TOOL-001
    description: Prefer documented AgToosa commands over ad-hoc host tooling
    enforcement_class: agent-instructed
    on_violation: warn

network:
  - id: NET-001
    description: Universal network sandbox is not provided by AgToosa
    enforcement_class: roadmap
    on_violation: warn

secrets:
  - id: SEC-001
    description: Declare secret names and handling only; never store secret values
    enforcement_class: CI-enforced
    on_violation: instruct_stop
    names:
      - API_TOKEN
      - DATABASE_PASSWORD

approvals:
  - id: APR-001
    description: Material policy changes require human review before activation
    enforcement_class: manual
    on_violation: instruct_stop

risky_actions:
  - id: RISK-001
    description: Packs cannot write denylisted destinations such as .github/workflows
    enforcement_class: generator-enforced
    on_violation: block_generator
    generator_operation: pack_destination_denylist
