name: PR Hygiene Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  push-main-ok:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Acknowledge push to main
        run: |
          echo "✅ Push to main acknowledged."
          echo "PR label, description, and issue-link checks run only on pull_request."

  require-labels:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Check PR has at least one label
        if: github.event_name == 'pull_request' && length(github.event.pull_request.labels) == 0
        run: |
          echo "❌ PR must have at least one label (bug, enhancement, documentation, chore)"
          exit 1

  require-description:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Check PR has description
        if: github.event_name == 'pull_request' && (github.event.pull_request.body == '' || github.event.pull_request.body == null)
        run: |
          echo "❌ PR must include a description"
          exit 1

  link-issue:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Check PR links to issue
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Check for "Closes #123", "Fixes #123", or "Resolves #123"
          if ! echo "$PR_BODY" | grep -qiE '(closes|fixes|resolves) #[0-9]+'; then
            echo "⚠️  PR should reference an issue (e.g., 'Closes #123')"
            # Note: This is a warning, not a hard requirement
          fi

  all-checks-pass:
    if: github.event_name == 'pull_request'
    needs: [require-labels, require-description, link-issue]
    runs-on: ubuntu-latest

    steps:
      - name: All branch protection checks passed
        run: echo "✅ PR meets all requirements"
