name: Close Stale Issues and PRs

on:
  schedule:
    # Run every day at 2 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Close stale issues (30 days no activity)
        uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639 # v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-issue-stale: 30
          days-before-issue-close: 7
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          stale-issue-message: |
            This issue has been inactive for 30 days. Closing it to keep the backlog clean.
            
            Feel free to reopen if you'd like to revisit this. For new discussions, use Discussions instead.
          stale-pr-message: |
            This PR has been inactive for 30 days. Closing it to keep the queue manageable.
            
            Feel free to reopen or create a fresh PR if you'd like to continue this work.
          close-issue-message: "Closed due to inactivity."
          close-pr-message: "Closed due to inactivity."
          exempt-issue-labels: "pinned,blocked,epic"
          exempt-pr-labels: "pinned,blocked,wip"
          operations-per-run: 100
