name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=v$VERSION" >> $GITHUB_OUTPUT

      - name: Verify tag matches agtoosa.sh version
        run: |
          SCRIPT_VERSION=$(grep -oP 'AGTOOSA_VERSION="\K[^"]+' agtoosa.sh)
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$SCRIPT_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Tag version ($TAG_VERSION) does not match agtoosa.sh version ($SCRIPT_VERSION)"
            exit 1
          fi
          echo "✅ Version verified: $SCRIPT_VERSION"

      - name: Extract changelog for this release
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract changelog section for this version
          CHANGELOG=$(awk "/^## \\[?${VERSION}\\]?/,/^## / {print}" CHANGELOG.md | head -n -1)
          # Escape for GitHub output
          CHANGELOG="${CHANGELOG//'%'/'%25'}"
          CHANGELOG="${CHANGELOG//$'\n'/'%0A'}"
          CHANGELOG="${CHANGELOG//$'\r'/'%0D'}"
          echo "content=$CHANGELOG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '%b\n' "${{ steps.changelog.outputs.content }}" > /tmp/release-notes.md
          gh release create "${{ steps.version.outputs.tag_name }}" \
            --title "AgToosa ${{ steps.version.outputs.version }}" \
            --notes-file /tmp/release-notes.md

      - name: Update project status
        run: |
          echo "✅ Release v${{ steps.version.outputs.version }} published to GitHub"
