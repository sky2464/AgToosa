name: Pre-Release Checklist

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version you are about to release (e.g. v2.7.0)'
        required: true

jobs:
  pre-release-gate:
    name: Pre-Release Gate — ${{ github.event.inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check AGTOOSA_VERSION matches intended release
        run: |
          set -euo pipefail
          INTENDED="${{ github.event.inputs.version }}"
          INTENDED="${INTENDED#v}"
          SCRIPT_VERSION=$(grep "^AGTOOSA_VERSION=" agtoosa.sh | cut -d'"' -f2)
          if [ "$SCRIPT_VERSION" != "$INTENDED" ]; then
            echo "❌ AGTOOSA_VERSION in agtoosa.sh is '$SCRIPT_VERSION', expected '$INTENDED'"
            echo "   Update agtoosa.sh before tagging."
            exit 1
          fi
          echo "✅ AGTOOSA_VERSION=$SCRIPT_VERSION matches intended release $INTENDED"

      - name: Check CHANGELOG entry exists
        run: |
          set -euo pipefail
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          if ! grep -q "## \[$VERSION\]" CHANGELOG.md; then
            echo "❌ No CHANGELOG.md entry for version $VERSION"
            echo "   Add a '## [$VERSION]' section before tagging."
            exit 1
          fi
          echo "✅ CHANGELOG entry found for $VERSION"

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: './'
          ignore_paths: 'template'

      - name: Install BATS
        run: |
          BATS_VERSION="v1.13.0"
          curl -sSL "https://github.com/bats-core/bats-core/archive/refs/tags/${BATS_VERSION}.tar.gz" -o bats.tar.gz
          tar -xzf bats.tar.gz
          sudo "./bats-core-${BATS_VERSION#v}/install.sh" /usr/local
          bats --version

      - name: Run BATS test suite
        run: bats tests/agtoosa.bats

      - name: Validate template completeness
        run: |
          set -euo pipefail
          MISSING=0
          while IFS= read -r f; do
            if [ ! -f "template/$f" ]; then
              echo "❌ Missing: template/$f"
              MISSING=$((MISSING + 1))
            fi
          done < <(bash agtoosa.sh --list-template-files)
          if [ "$MISSING" -gt 0 ]; then
            echo "🔥 $MISSING template file(s) missing."
            exit 1
          fi
          echo "✅ All template files present."

      - name: Check milestone progress
        uses: actions/github-script@v7
        with:
          script: |
            const version = "${{ github.event.inputs.version }}".replace(/^v/, '');
            const milestones = await github.rest.issues.listMilestones({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });
            const ms = milestones.data.find(m => m.title === `v${version}`);
            if (!ms) {
              console.log(`⚠️  No open milestone named v${version} — skipping progress check.`);
              return;
            }
            const total = ms.open_issues + ms.closed_issues;
            const pct = total > 0 ? Math.round((ms.closed_issues / total) * 100) : 0;
            console.log(`Milestone v${version}: ${ms.closed_issues}/${total} issues closed (${pct}%)`);
            if (pct < 90) {
              core.warning(`Milestone is only ${pct}% complete — confirm all required issues are closed before tagging.`);
            } else {
              console.log(`✅ Milestone is ${pct}% complete — ready to release.`);
            }

      - name: Summary
        run: |
          echo ""
          echo "========================================"
          echo "  ✅ Pre-release checklist PASSED"
          echo "  Ready to tag: ${{ github.event.inputs.version }}"
          echo ""
          echo "  Next steps:"
          echo "    git tag ${{ github.event.inputs.version }}"
          echo "    git push origin ${{ github.event.inputs.version }}"
          echo "========================================"
