name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'

defaults:
  run:
    shell: bash

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck -x -S warning \
            --exclude=SC2002,SC2046,SC2086,SC1091,SC2034 \
            agtoosa.sh bootstrap.sh lib/*.sh

      - name: Guard README install command regressions
        run: |
          set -euo pipefail
          if grep -n "raw.githubusercontent.com/sky2464/AgToosa/main/agtoosa.sh" README.md; then
            echo "❌ Legacy one-file install command found in README.md"
            exit 1
          fi
          echo "✅ README install command guard passed"

      - name: Version parity (bash vs PowerShell)
        run: |
          set -euo pipefail
          BASH_VER=$(grep -m1 'AGTOOSA_VERSION=' agtoosa.sh | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          PS_VER=$(grep -m1 'AGTOOSA_VERSION\s*=' agtoosa.ps1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          if [ "$BASH_VER" != "$PS_VER" ]; then
            echo "❌ Version mismatch: agtoosa.sh=$BASH_VER agtoosa.ps1=$PS_VER"
            exit 1
          fi
          echo "✅ Version parity: bash=v$BASH_VER ps1=v$PS_VER"

      - name: Markdown Lint
        timeout-minutes: 3
        run: |
          timeout 180s npx --yes markdownlint-cli2 \
            "*.md" \
            "docs/**/*.md" \
            ".github/**/*.md" || true

      - name: Validate Template Completeness
        run: |
          set -euo pipefail
          MISSING=0
          while IFS= read -r f; do
            if [ ! -f "template/$f" ]; then
              echo "❌ Missing: template/$f"
              MISSING=$((MISSING + 1))
            fi
          done < <(bash agtoosa.sh --list-template-files)

          if [ "$MISSING" -gt 0 ]; then
            echo "🔥 Total missing: $MISSING"
            exit 1
          fi
          echo "✅ All template files verified."

      - name: Validate Optional Template Files
        run: |
          set -euo pipefail
          # Source config to get OPTIONAL_TEMPLATE_FILES array, then check each.
          source lib/config.sh
          MISSING=0
          for f in "${OPTIONAL_TEMPLATE_FILES[@]}"; do
            if [ ! -f "template/$f" ]; then
              echo "⚠️  Missing optional: template/$f"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "🔥 $MISSING optional template file(s) missing — update OPTIONAL_TEMPLATE_FILES in lib/config.sh or add the files."
            exit 1
          fi
          echo "✅ All optional template files verified."

      - name: Install BATS
        run: |
          BATS_VERSION="v1.13.0"
          BATS_SHA256="a85e12b8828271a152b338ca8109aa23493b57950987c8e6dff97ba492772ff3"
          curl -sSL "https://github.com/bats-core/bats-core/archive/refs/tags/${BATS_VERSION}.tar.gz" -o bats.tar.gz
          echo "${BATS_SHA256}  bats.tar.gz" | sha256sum -c -
          tar -xzf bats.tar.gz
          sudo "./bats-core-${BATS_VERSION#v}/install.sh" /usr/local
          bats --version

      - name: Run generator smoke tests
        run: bats tests/agtoosa.bats

  windows-smoke:
    name: Windows PowerShell Smoke Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: PSScriptAnalyzer approved verbs
        shell: pwsh
        timeout-minutes: 5
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -RequiredVersion 1.21.0 -Force -AllowClobber -Scope CurrentUser -Repository PSGallery -Confirm:$false
          $findings = Invoke-ScriptAnalyzer -Path "$env:GITHUB_WORKSPACE\agtoosa.ps1" -IncludeRule PSUseApprovedVerbs -Severity Error, Warning
          if ($findings) {
            $findings | Format-Table -AutoSize
            exit 1
          }
          Write-Output "✅ PSScriptAnalyzer PSUseApprovedVerbs passed"

      - name: Verify agtoosa.ps1 exists and reports version
        shell: pwsh
        run: |
          $output = & "$env:GITHUB_WORKSPACE\agtoosa.ps1" -Version 2>&1
          Write-Output "Output: $output"
          if ($output -notmatch '\d+\.\d+\.\d+') {
            Write-Error "agtoosa.ps1 --version did not print a version string"
            exit 1
          }
          Write-Output "✅ agtoosa.ps1 -Version passed"

      - name: Verify agtoosa.ps1 --help flag
        shell: pwsh
        run: |
          $output = & "$env:GITHUB_WORKSPACE\agtoosa.ps1" -Help 2>&1
          Write-Output "Output: $output"
          if ($output -notmatch 'AgToosa') {
            Write-Error "agtoosa.ps1 -Help did not print expected output"
            exit 1
          }
          Write-Output "✅ agtoosa.ps1 -Help passed"

      - name: PS1 registry list smoke test
        shell: pwsh
        run: |
          # Pre-seed cache so the test never hits the network.
          $cacheDir = "$env:USERPROFILE\.cache\agtoosa"
          New-Item -ItemType Directory -Path $cacheDir -Force | Out-Null
          Copy-Item "$env:GITHUB_WORKSPACE\tests\fixtures\registry.json" "$cacheDir\registry.json"
          # Touch the file so the cache TTL check passes.
          (Get-Item "$cacheDir\registry.json").LastWriteTime = [DateTime]::Now

          $output = & "$env:GITHUB_WORKSPACE\agtoosa.ps1" -Registry -RegistryCommand list 2>&1
          Write-Output "Output: $output"
          if ($output -notmatch 'ml-pipeline') {
            Write-Error "agtoosa.ps1 -Registry list did not return expected pack names"
            exit 1
          }
          Write-Output "✅ agtoosa.ps1 registry list passed"

      - name: PS1 registry search smoke test
        shell: pwsh
        run: |
          $cacheDir = "$env:USERPROFILE\.cache\agtoosa"
          if (-not (Test-Path "$cacheDir\registry.json")) {
            New-Item -ItemType Directory -Path $cacheDir -Force | Out-Null
            Copy-Item "$env:GITHUB_WORKSPACE\tests\fixtures\registry.json" "$cacheDir\registry.json"
          }
          (Get-Item "$cacheDir\registry.json").LastWriteTime = [DateTime]::Now

          $output = & "$env:GITHUB_WORKSPACE\agtoosa.ps1" -Registry -RegistryCommand search -RegistryArg "react" 2>&1
          Write-Output "Output: $output"
          if ($output -notmatch 'react-native') {
            Write-Error "agtoosa.ps1 -Registry search did not find react-native"
            exit 1
          }
          Write-Output "✅ agtoosa.ps1 registry search passed"
