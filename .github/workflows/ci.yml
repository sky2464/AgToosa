name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

defaults:
  run:
    shell: bash

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck -x -S warning \
            --exclude=SC2002,SC2046,SC2086,SC1091 \
            agtoosa.sh lib/*.sh

      - name: Markdown Lint
        continue-on-error: true
        uses: DavidAnson/markdownlint-cli2-action@v23.0.0
        with:
          globs: |
            *.md
            docs/**/*.md
            .github/**/*.md

      - name: Validate Template Completeness
        run: |
          set -euo pipefail
          MISSING=0
          while IFS= read -r f; do
            if [ ! -f "template/$f" ]; then
              echo "❌ Missing: template/$f"
              MISSING=$((MISSING + 1))
            fi
          done < <(bash agtoosa.sh --list-template-files)

          if [ "$MISSING" -gt 0 ]; then
            echo "🔥 Total missing: $MISSING"
            exit 1
          fi
          echo "✅ All template files verified."

      - name: Install BATS
        run: |
          BATS_VERSION="v1.13.0"
          curl -sSL "https://github.com/bats-core/bats-core/archive/refs/tags/${BATS_VERSION}.tar.gz" -o bats.tar.gz
          tar -xzf bats.tar.gz
          sudo "./bats-core-${BATS_VERSION#v}/install.sh" /usr/local
          bats --version

      - name: Run generator smoke tests
        run: bats tests/agtoosa.bats
