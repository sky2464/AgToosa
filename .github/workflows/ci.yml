name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: './'
          ignore: 'template'

      - name: Markdown Lint
        uses: DavidAnson/markdownlint-cli2-action@v23.0.0
        with:
          globs: |
            **/*.md
            **/*.mdc
            **/.cursorrules
            **/.windsurfrules

      - name: Validate Template Completeness
        run: |
          set -euo pipefail
          MISSING=0
          while IFS= read -r f; do
            if [ ! -f "template/$f" ]; then
              echo "❌ Missing: template/$f"
              MISSING=$((MISSING + 1))
            fi
          done < <(bash agtoosa.sh --list-template-files)

          if [ "$MISSING" -gt 0 ]; then
            echo "🔥 Total missing: $MISSING"
            exit 1
          fi
          echo "✅ All template files verified."

      - name: Install BATS
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run generator smoke tests
        run: bats tests/agtoosa.bats
