name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: './'
          ignore: 'template'

      - name: Markdown Lint
        run: |
          npx --yes markdownlint-cli2 \
            "**/*.md" \
            "template/**/.cursorrules" \
            "template/**/.windsurfrules" \
            "template/**/.roorules" \
            "#node_modules"

      - name: Validate Template Completeness
        run: |
          # Extract DOCS_FILES array from agtoosa.sh and verify every file exists in template/
          MISSING=0
          # Parse lines inside DOCS_FILES=( ... ) block
          FILES=$(awk '/^DOCS_FILES=\(/,/^\)/' agtoosa.sh | grep -oP '"[^"]+"' | tr -d '"')

          for f in $FILES; do
            if [ ! -f "template/$f" ]; then
              echo "❌ Missing: template/$f"
              MISSING=$((MISSING + 1))
            fi
          done

          if [ "$MISSING" -gt 0 ]; then
            echo "🔥 Total missing: $MISSING"
            exit 1
          fi
          echo "✅ All template files verified."
