name: Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run security scans weekly
    - cron: "0 0 * * 0"

jobs:
  shellcheck-security:
    name: ShellCheck Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run ShellCheck with security flags
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          # SC2002: Useless cat, but required for pipes
          # SC2046: Word splitting in unquoted variable
          # SC2086: Unquoted variable (context-specific)
          shellcheck -x -S warning \
            --exclude=SC2002,SC2046,SC2086,SC1091 \
            agtoosa.sh lib/*.sh

  dependency-check:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@1.1.0
        with:
          project: 'AgToosa'
          path: '.'
          format: 'SARIF'
          others: >
            --exclude node_modules,tests,.git,.github,.wiki,template

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: ${{ always() && hashFiles('reports/dependency-check-report.sarif') != '' }}
        with:
          sarif_file: reports/dependency-check-report.sarif
          category: dependency-check

  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Secrets (truffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

  trivy-scan:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          hide-progress: true
          ignore-unfixed: true
          limit-severities-for-sarif: true
          scanners: 'vuln'
          severity: 'HIGH,CRITICAL'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: ${{ always() && hashFiles('trivy-results.sarif') != '' }}
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'
