name: Security Scanning

on:
  schedule:
    # Weekly only — push/PR triggers removed to save runner minutes
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  shellcheck-security:
    name: ShellCheck Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Run ShellCheck with security flags
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          # SC2002: Useless cat, but required for pipes
          # SC2046: Word splitting in unquoted variable
          # SC2086: Unquoted variable (context-specific)
          # SC2034: Variable appears unused (cross-file variables sourced externally)
          shellcheck -x -S warning \
            --exclude=SC2002,SC2046,SC2086,SC1091,SC2034 \
            agtoosa.sh lib/*.sh

  dependency-check:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@75ba02d6183445fe0761d26e836bde58b1560600 # 1.1.0
        with:
          project: 'AgToosa'
          path: '.'
          format: 'SARIF'

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@b25d0ebf40e5b63ee81e1bd6e5d2a12b7c2aeb61 # v4
        if: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) && always() && hashFiles('reports/dependency-check-report.sarif') != '' }}
        with:
          sarif_file: reports/dependency-check-report.sarif
          category: dependency-check

  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Detect Secrets (truffleHog) — PR diff only
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@cf31c26af3131bd053d161a3b2155ed0cc47a050 # main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

      - name: Detect Secrets (truffleHog) — full history
        if: github.event_name != 'pull_request'
        uses: trufflesecurity/trufflehog@cf31c26af3131bd053d161a3b2155ed0cc47a050 # main
        with:
          path: ./
          extra_args: --only-verified

  trivy-scan:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          hide-progress: true
          ignore-unfixed: true
          limit-severities-for-sarif: true
          scanners: 'vuln'
          severity: 'HIGH,CRITICAL'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@b25d0ebf40e5b63ee81e1bd6e5d2a12b7c2aeb61 # v4
        if: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) && always() && hashFiles('trivy-results.sarif') != '' }}
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'
