name: Advanced Release Automation

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v2.5.0)'
        required: true
      prerelease:
        description: 'Mark as pre-release?'
        type: boolean
        default: false

jobs:
  version-validation:
    name: Validate Version Consistency
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Extract version from tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == "refs/tags/"* ]]; then
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
            VERSION="${VERSION#v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Validate version in agtoosa.sh
        run: |
          SCRIPT_VERSION=$(grep "^AGTOOSA_VERSION=" agtoosa.sh | cut -d'"' -f2)
          TAG_VERSION="${{ steps.tag.outputs.version }}"
          
          if [ "$SCRIPT_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch!"
            echo "  agtoosa.sh: $SCRIPT_VERSION"
            echo "  tag:        $TAG_VERSION"
            exit 1
          fi
          
          echo "✅ Version consistency check passed: $SCRIPT_VERSION"

      - name: Check CHANGELOG entry
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          if ! grep -q "## \[$VERSION\]" CHANGELOG.md; then
            echo "❌ No CHANGELOG entry for version $VERSION"
            exit 1
          fi
          echo "✅ CHANGELOG entry found for version $VERSION"

      - name: Validate README install placeholders
        run: |
          set -euo pipefail

          if ! grep -q "bootstrap.sh) --ref vX.Y.Z" README.md; then
            echo "❌ README must keep the pinned install placeholder '--ref vX.Y.Z'"
            exit 1
          fi

          if grep -Eq "bootstrap\.sh\) --ref v[0-9]+\.[0-9]+\.[0-9]+" README.md; then
            echo "❌ README contains a hardcoded bootstrap tag; use vX.Y.Z placeholder instead"
            exit 1
          fi

          echo "✅ README install placeholders validated"

  create-milestone:
    name: Create GitHub Milestone
    runs-on: ubuntu-latest
    needs: version-validation
    if: success()
    steps:
      - name: Create milestone for next version
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            try {
              const currentVersion = "${{ needs.version-validation.outputs.version }}";
              const nextVersion = currentVersion.split('.')
                .map((v, i) => i === 1 ? parseInt(v) + 1 : v)
                .join('.');
              
              const milestones = await github.rest.issues.listMilestones({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open'
              });
              
              const exists = milestones.data.some(m => 
                m.title === `v${nextVersion}`
              );
              
              if (!exists) {
                await github.rest.issues.createMilestone({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `v${nextVersion}`,
                  description: `Release v${nextVersion}`
                });
                console.log(`Created milestone: v${nextVersion}`);
              } else {
                console.log(`Milestone v${nextVersion} already exists`);
              }
            } catch (error) {
              console.error('Milestone creation error:', error);
            }

  extract-changelog:
    name: Extract Release Notes from CHANGELOG
    runs-on: ubuntu-latest
    needs: version-validation
    outputs:
      release-notes: ${{ steps.extract.outputs.notes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Extract changelog section
        id: extract
        run: |
          VERSION="${{ needs.version-validation.outputs.version }}"
          
          # Extract changelog section between current version and next version marker
          awk "/## \[$VERSION\]/,/## \[/ { print }" CHANGELOG.md | \
          head -n -1 | \
          sed '1d' > /tmp/release-notes.txt
          
          # Remove markdown comments
          sed -i '/^---$/d' /tmp/release-notes.txt
          
          # Handle multiline output in GitHub Actions
          {
            echo 'notes<<EOF'
            cat /tmp/release-notes.txt
            echo 'EOF'
          } >> $GITHUB_OUTPUT

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [version-validation, extract-changelog]
    if: success()
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Create Release
        uses: actions/create-release@0cb9c9b65d5d1901c1f53e5e66eaf4afd303e70e # v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.version-validation.outputs.tag }}
          release_name: "Release ${{ needs.version-validation.outputs.tag }}"
          body: ${{ needs.extract-changelog.outputs.release-notes }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease || false }}

  bump-homebrew-formula:
    name: Bump Homebrew Formula
    runs-on: ubuntu-latest
    needs: [version-validation, publish-release]
    if: success()
    # Failures here must NOT block the release — formula bump is best-effort
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Compute release tarball SHA-256 and update formula
        env:
          VERSION: ${{ needs.version-validation.outputs.version }}
          TAG: ${{ needs.version-validation.outputs.tag }}
        run: |
          set -euo pipefail
          TARBALL_URL="https://github.com/sky2464/AgToosa/archive/refs/tags/${TAG}.tar.gz"
          echo "Downloading tarball from $TARBALL_URL..."
          curl -fsSL "$TARBALL_URL" -o /tmp/agtoosa-release.tar.gz
          SHA256=$(sha256sum /tmp/agtoosa-release.tar.gz | awk '{print $1}')
          echo "SHA256: $SHA256"

          # Update Formula/agtoosa.rb with new version and sha256
          sed -i "s|url \".*\"|url \"$TARBALL_URL\"|" Formula/agtoosa.rb
          sed -i "s|sha256 \".*\"|sha256 \"$SHA256\"|" Formula/agtoosa.rb
          sed -i "s|version \".*\"|version \"$VERSION\"|" Formula/agtoosa.rb

          echo "Updated Formula/agtoosa.rb:"
          cat Formula/agtoosa.rb

      - name: Commit updated formula
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          VERSION: ${{ needs.version-validation.outputs.version }}
          TAG: ${{ needs.version-validation.outputs.tag }}
        with:
          script: |
            const fs = require('fs');
            const formulaContent = fs.readFileSync('Formula/agtoosa.rb', 'utf8');
            const version = process.env.VERSION;
            const tag = process.env.TAG;

            // Get current file SHA for update
            let currentSha;
            try {
              const { data } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: 'Formula/agtoosa.rb',
              });
              currentSha = data.sha;
            } catch (e) {
              console.log('Formula file not found in repo; will create it.');
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'Formula/agtoosa.rb',
              message: `chore(homebrew): bump formula to ${tag}`,
              content: Buffer.from(formulaContent).toString('base64'),
              sha: currentSha,
            });
            console.log(`✅ Homebrew formula bumped to ${tag}`);

  notify-release:
    name: Notify Release in Discussions
    runs-on: ubuntu-latest
    needs: [version-validation, publish-release]
    if: success()
    # A failure here must NOT block the release — announcements are best-effort
    continue-on-error: true
    steps:
      - name: Create release announcement discussion
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const version = "${{ needs.version-validation.outputs.tag }}";

            // Safely look up the Announcements discussion category
            let categoryId = null;
            try {
              const query = `
                query($owner: String!, $repo: String!) {
                  repository(owner: $owner, name: $repo) {
                    discussionCategories(first: 20) {
                      nodes { id name }
                    }
                  }
                }`;
              const result = await github.graphql(query, {
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              const categories = result.repository.discussionCategories.nodes;
              const announcements = categories.find(
                c => c.name.toLowerCase().includes('announcement')
              );
              const general = categories.find(
                c => c.name.toLowerCase().includes('general')
              );
              categoryId = (announcements || general || categories[0])?.id;
            } catch (err) {
              console.warn('Could not fetch discussion categories:', err.message);
            }

            if (!categoryId) {
              console.log('No discussion category found — skipping announcement.');
              return;
            }

            const mutation = `
              mutation($input: CreateDiscussionInput!) {
                createDiscussion(input: $input) {
                  discussion { url }
                }
              }`;
            const disc = await github.graphql(mutation, {
              input: {
                repositoryId: (await github.rest.repos.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                })).data.node_id,
                categoryId,
                title: `\ud83d\udce6 ${version} Released`,
                body: [
                  `**AgToosa ${version} is now available!**`,
                  '',
                  `[View release notes \u2192](https://github.com/${context.repo.owner}/${context.repo.repo}/releases/tag/${version})`,
                  '',
                  'Install or update:',
                  '```bash',
                  '# Persistent install (recommended)',
                  'brew install sky2464/agtoosa/agtoosa',
                  'brew upgrade agtoosa',
                  '',
                  '# One-time usage pinned to this release',
                  `bash <(curl -fsSL https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/main/bootstrap.sh) --ref ${version}`,
                  '```',
                ].join('\n'),
              },
            });
            console.log(`Created announcement: ${disc.createDiscussion.discussion.url}`);
