name: Advanced Release Automation

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v2.5.0)'
        required: true
      prerelease:
        description: 'Mark as pre-release?'
        type: boolean
        default: false

jobs:
  version-validation:
    name: Validate Version Consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == "refs/tags/"* ]]; then
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
            VERSION="${VERSION#v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Validate version in agtoosa.sh
        run: |
          SCRIPT_VERSION=$(grep "^AGTOOSA_VERSION=" agtoosa.sh | cut -d'"' -f2)
          TAG_VERSION="${{ steps.tag.outputs.version }}"
          
          if [ "$SCRIPT_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch!"
            echo "  agtoosa.sh: $SCRIPT_VERSION"
            echo "  tag:        $TAG_VERSION"
            exit 1
          fi
          
          echo "✅ Version consistency check passed: $SCRIPT_VERSION"

      - name: Check CHANGELOG entry
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          if ! grep -q "## \[$VERSION\]" CHANGELOG.md; then
            echo "❌ No CHANGELOG entry for version $VERSION"
            exit 1
          fi
          echo "✅ CHANGELOG entry found for version $VERSION"

  create-milestone:
    name: Create GitHub Milestone
    runs-on: ubuntu-latest
    needs: version-validation
    if: success()
    steps:
      - name: Create milestone for next version
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const currentVersion = "${{ needs.version-validation.outputs.version }}";
              const nextVersion = currentVersion.split('.')
                .map((v, i) => i === 1 ? parseInt(v) + 1 : v)
                .join('.');
              
              const milestones = await github.rest.issues.listMilestones({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open'
              });
              
              const exists = milestones.data.some(m => 
                m.title === `v${nextVersion}`
              );
              
              if (!exists) {
                await github.rest.issues.createMilestone({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `v${nextVersion}`,
                  description: `Release v${nextVersion}`
                });
                console.log(`Created milestone: v${nextVersion}`);
              } else {
                console.log(`Milestone v${nextVersion} already exists`);
              }
            } catch (error) {
              console.error('Milestone creation error:', error);
            }

  extract-changelog:
    name: Extract Release Notes from CHANGELOG
    runs-on: ubuntu-latest
    needs: version-validation
    outputs:
      release-notes: ${{ steps.extract.outputs.notes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract changelog section
        id: extract
        run: |
          VERSION="${{ needs.version-validation.outputs.version }}"
          
          # Extract changelog section between current version and next version marker
          awk "/## \[$VERSION\]/,/## \[/ { print }" CHANGELOG.md | \
          head -n -1 | \
          sed '1d' > /tmp/release-notes.txt
          
          # Remove markdown comments
          sed -i '/^---$/d' /tmp/release-notes.txt
          
          # Handle multiline output in GitHub Actions
          {
            echo 'notes<<EOF'
            cat /tmp/release-notes.txt
            echo 'EOF'
          } >> $GITHUB_OUTPUT

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [version-validation, extract-changelog]
    if: success()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.version-validation.outputs.tag }}
          release_name: "Release ${{ needs.version-validation.outputs.tag }}"
          body: ${{ needs.extract-changelog.outputs.release-notes }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease || false }}

  notify-release:
    name: Notify Release in Discussions
    runs-on: ubuntu-latest
    needs: [version-validation, publish-release]
    if: success()
    steps:
      - name: Create release announcement
        uses: actions/github-script@v7
        with:
          script: |
            const version = "${{ needs.version-validation.outputs.tag }}";
            
            const discussion = await github.rest.discussions.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📦 ${version} Released`,
              category_id: 'DIC_kwDOPBqjKc4Ck4Kh',
              body: `[See release details](https://github.com/${{ github.repository }}/releases/tag/${version})`
            });
            
            console.log(`Created announcement: ${discussion.data.html_url}`);
