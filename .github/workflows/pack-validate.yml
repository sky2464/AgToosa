# DEV-096 — Pack Validation CI
# Fails closed when official pack manifests, fixture SHA metadata, or Docs/ trees drift.
name: Pack Validate

on:
  pull_request:
    paths:
      - "packs/official-*/**"
      - "tests/fixtures/registry-packs/official-*/**"
      - "scripts/validate-official-packs.sh"
      - ".github/workflows/pack-validate.yml"
  push:
    branches: [main]
    paths:
      - "packs/official-*/**"
      - "tests/fixtures/registry-packs/official-*/**"
      - "scripts/validate-official-packs.sh"
      - ".github/workflows/pack-validate.yml"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  pack-validate:
    name: Official pack validation + OPP bats
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install jq
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Install BATS
        run: |
          set -euo pipefail
          BATS_VERSION="v1.13.0"
          BATS_SHA256="a85e12b8828271a152b338ca8109aa23493b57950987c8e6dff97ba492772ff3"
          curl -sSL "https://github.com/bats-core/bats-core/archive/refs/tags/${BATS_VERSION}.tar.gz" -o bats.tar.gz
          echo "${BATS_SHA256}  bats.tar.gz" | sha256sum -c -
          tar -xzf bats.tar.gz
          sudo "./bats-core-${BATS_VERSION#v}/install.sh" /usr/local
          bats --version

      - name: Validate official packs (offline/private)
        run: |
          set -euo pipefail
          bash scripts/validate-official-packs.sh --mode private

      - name: Focused OPP bats gate
        run: |
          set -euo pipefail
          bats tests/agtoosa.bats -f "OPP"
