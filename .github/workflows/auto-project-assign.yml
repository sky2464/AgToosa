name: Auto-Assign to Project

on:
  issues:
    types: [opened]

jobs:
  assign:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Auto-assign new issues to GitHub Project
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            
            // Skip if already assigned to project
            if (issue.pull_request) return;
            
            try {
              // Get repository project ID (AgToosa board)
              const projects = await github.rest.projects.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open'
              });
              
              const agtoosaProject = projects.data.find(p => 
                p.name.toLowerCase().includes('agtoosa')
              );
              
              if (!agtoosaProject) {
                console.log('AgToosa project not found');
                return;
              }
              
              // Get project columns
              const columns = await github.rest.projects.listColumns({
                project_id: agtoosaProject.id
              });
              
              // Find "Backlog" or "Todo" column
              const backlogColumn = columns.data.find(c => 
                c.name.toLowerCase() === 'backlog' || 
                c.name.toLowerCase() === 'todo'
              );
              
              if (!backlogColumn) {
                console.log('Backlog column not found');
                return;
              }
              
              // Create card in column
              await github.rest.projects.createCard({
                column_id: backlogColumn.id,
                content_id: issue.id,
                content_type: 'Issue'
              });
              
              console.log(`Issue #${issue.number} assigned to project ${agtoosaProject.name}`);
            } catch (error) {
              console.error('Error assigning to project:', error);
              // Don't fail the workflow if project assignment fails
            }
