name: "✨ Feature Request"
description: Suggest a new feature or improvement
labels: ["enhancement", "status-needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Have an idea to improve AgToosa? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve?
      placeholder: "Describe the pain point or use case"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should AgToosa solve this?
      placeholder: "Describe your proposed solution"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches?

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, code examples, related issues

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "Low - Nice to have"
        - "Medium - Useful improvement"
        - "High - Solves major pain point"
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: How will we know when this feature is done?
      placeholder: |
        - [ ] AC-1: ...
        - [ ] AC-2: ...
    validations:
      required: true
