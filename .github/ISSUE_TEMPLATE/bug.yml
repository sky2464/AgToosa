name: "🐛 Bug Report"
description: Report a bug or issue with AgToosa
labels: ["bug", "status-needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please provide details to help us fix it.

  - type: input
    id: version
    attributes:
      label: AgToosa Version
      description: What version of AgToosa are you using? (e.g., v2.4.0)
      placeholder: "v2.4.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
      placeholder: "Clear and concise description of the bug"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Run `bash agtoosa.sh`
        2. Select platform...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Any error messages or logs
      render: bash

  - type: input
    id: platform
    attributes:
      label: Platform
      description: "macOS, Linux, WSL, etc."

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        bash version, OS version, editor/IDE, etc.
      render: bash
