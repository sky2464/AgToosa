name: "🐛 Bug Report"
description: Report a bug or issue with AgToosa
labels: ["bug", "status-needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please provide details to help us fix it.

  - type: input
    id: version
    attributes:
      label: AgToosa Version
      description: What version of AgToosa are you using? (e.g., v2.4.0)
      placeholder: "v2.4.0"
    validations:
      required: true

  - type: input
    id: operating_system
    attributes:
      label: Operating system
      description: "macOS, Linux distribution, Windows version, WSL2, or Git Bash"
      placeholder: "macOS 15.5, Ubuntu 24.04, Windows 11 PowerShell"
    validations:
      required: true

  - type: input
    id: shell
    attributes:
      label: Shell
      description: "Shell used to run AgToosa"
      placeholder: "bash 5.2, zsh launching bash, PowerShell 7.5"
    validations:
      required: true

  - type: textarea
    id: install_command
    attributes:
      label: Install command
      description: "Exact command used to install or run AgToosa"
      render: bash
    validations:
      required: true

  - type: textarea
    id: target_project_context
    attributes:
      label: Target project context
      description: "New repo or existing repo, selected platforms, and whether this was install, update, registry, or bootstrap"
      placeholder: "Existing repo; selected Docs + Claude + Codex; ran --update"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
      placeholder: "Clear and concise description of the bug"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Run `bash agtoosa.sh`
        2. Select platform...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Any error messages or logs
      render: bash

  - type: input
    id: platform
    attributes:
      label: Platform
      description: "macOS, Linux, WSL, etc."

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        bash version, OS version, editor/IDE, etc.
      render: bash
