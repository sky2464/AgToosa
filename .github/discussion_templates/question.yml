    attributes:
      label: "Context"
      placeholder: "Environment, version, error messages, etc."
  - type: markdown
    attributes:
      value: |
        **Note:** For bugs and feature requests, use [Issues](https://github.com/sky2464/AgToosa/issues) instead.
