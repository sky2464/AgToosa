description = "AgToosa: research → 6 forcing questions → Executable Specification → STRIDE threat model → atomic task planning"
prompt = """

## Gemini command routing

This file is the native Gemini CLI command for `/agtoosa-spec`. When the user invokes `/agtoosa-spec`, execute the AgToosa workflow below — do **not** route to `/create-skill` or generate a project skill for AgToosa workflow names.

Read Docs/AgToosa_Spec.md and execute the specification workflow. Generated Project Mode — see Docs/AgToosa_Agent.md Operating Contexts (the project/product, not AgToosa as the app).

Dispatch based on any arguments provided after the command:
- /agtoosa-spec                   → full workflow (Parts 1 + 2 + 3 + 4: research, spec, architecture/threat-model, task planning)
- /agtoosa-spec research <topic>  → Part 1 only: context, research, domain language alignment, 6 forcing questions
- /agtoosa-spec plan              → Part 2 only: architecture blueprint + threat model
- /agtoosa-spec quick <desc>      → abbreviated: 3 questions + spec, skip full threat model
- /agtoosa-spec tasks             → Part 4 only: scope boundary + atomic task breakdown + test plan skeleton against an already-approved spec
- /agtoosa-spec to-issues         → break active spec into vertical-slice GitHub issues

Phase stop: stop at the approval gate. Do not run /agtoosa-build automatically — the user must invoke it after approval.

On successful completion, print this line verbatim: ✅ Done. Run /agtoosa-status to verify findings cleared.
"""
